version: '3.8'

services:
  # Backend API Service
  backend:
    build: .
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WS_PORT=3002
      # Neon PostgreSQL Database
      - DB_USER=${DB_USER:-neondb_owner}
      - DB_HOST=${DB_HOST:-ep-wispy-shadow-a4u4vn6o-pooler.us-east-1.aws.neon.tech}
      - DB_NAME=${DB_NAME:-neondb}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT:-5432}
      - DB_SSL=${DB_SSL:-true}
      # Redis (local on instance)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_TLS=false
      # Application
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # Redis (running on same instance)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network
    # Don't expose Redis port externally for security
    # Only accessible within Docker network

volumes:
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
