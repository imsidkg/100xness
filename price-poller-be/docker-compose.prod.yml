version: "3.8"

services:
  # Backend API Service
  backend:
    build: .
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WS_PORT=3002
      # Local PostgreSQL Database
      - DB_USER=tradinguser
      - DB_HOST=postgres
      - DB_NAME=trading_db
      - DB_PASSWORD=Trading@2024!Secure
      - DB_PORT=5432
      - DB_SSL=false
      # Redis (local on instance)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_TLS=false
      # Application
      - JWT_SECRET=${JWT_SECRET:-EiWpkFAm84GHJaL0NU9Hrradik3dpy2B}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://100xness.imsidkg.me}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # Redis (running on same instance)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network
    # Don't expose Redis port externally for security
    # Only accessible within Docker network

  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_USER=tradinguser
      - POSTGRES_PASSWORD=Trading@2024!Secure
      - POSTGRES_DB=trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
    # Don't expose PostgreSQL port externally for security
    # Only accessible within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradinguser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
